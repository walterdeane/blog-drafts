<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terminals by SIM Provider &amp; Cell Towers</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v='3')}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="demo-map-page demo-map-page--network">
<div th:replace="~{fragments/nav :: nav}"></div>

<header class="demo-hero demo-hero--network">
    <div class="demo-hero-inner">
        <p class="demo-eyebrow"><a href="/">Home</a> / Demo maps / Network &amp; coverage</p>
        <h1>Terminals by SIM Provider &amp; Cell Towers</h1>
        <p class="demo-subtitle">
            Terminals colored by SIM provider with Telstra, Optus, and other cell towers.
            Coverage circles are off by default — use the layer control to turn them on.
        </p>
    </div>
</header>

<main class="demo-main">
    <div class="demo-map-frame">
        <div class="demo-map-shell">
            <div id="map" class="map-container"></div>
        </div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:src="@{/js/demo-map.js(v='3')}"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    initTerminalNetworkMap(/*[[${wmsUrl}]]*/ 'http://localhost:8080/geoserver/geospatial-monitoring/wms');
    /*]]>*/
</script>
</body>
</html>
