<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terminal Sales by Day</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v='3')}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="demo-map-page demo-map-page--sales">
<div th:replace="~{fragments/nav :: nav}"></div>

<header class="demo-hero demo-hero--sales">
    <div class="demo-hero-inner">
        <p class="demo-eyebrow"><a href="/">Home</a> / Demo maps / Sales</p>
        <h1>Terminal Sales by Day</h1>
        <p class="demo-subtitle">
            Daily sales totals per terminal, colored in bands from light to dark green.
            Pick a day from the dropdown to update the map, and click a terminal for details.
        </p>
    </div>
</header>

<main class="demo-main">
    <div class="demo-map-frame">
        <div class="demo-map-shell">
            <div id="map" class="map-container"></div>
        </div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:src="@{/js/demo-map.js(v='3')}"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    initSalesByDayMap(
        /*[[${wmsUrl}]]*/ 'http://localhost:8080/geoserver/geospatial-monitoring/wms',
        /*[[${dates}]]*/ ['2026-06-14']
    );
    /*]]>*/
</script>
</body>
</html>
