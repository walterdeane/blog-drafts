services:
  postgis:
    build: ./postgis
    container_name: geospatial-postgis
    environment:
      POSTGRES_DB: geospatial
      POSTGRES_USER: geospatial
      POSTGRES_PASSWORD: geospatial
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./postgis/init:/docker-entrypoint-initdb.d
      - ./src-data:/seed-data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geospatial"]
      interval: 5s
      timeout: 5s
      retries: 5

  geoserver:
    image: kartoza/geoserver:2.24.2
    container_name: geospatial-geoserver
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8080:8080"
    depends_on:
      postgis:
        condition: service_healthy
    volumes:
      - ./geoserver/data:/opt/geoserver/data_dir

  processing-service:
    build: ./processing-service
    container_name: geospatial-processing-service
    environment:
      POSTGIS_HOST: postgis
      POSTGIS_DB: geospatial
      POSTGIS_USER: geospatial
      POSTGIS_PASSWORD: geospatial
      GOOGLE_GEOLOCATION_API_KEY: ${GOOGLE_GEOLOCATION_API_KEY:-}
    ports:
      - "8081:8081"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgis-data:
