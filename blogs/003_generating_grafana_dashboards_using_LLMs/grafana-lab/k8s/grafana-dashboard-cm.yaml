apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  demo-app-dashboard.json: |
    {
      "id": null,
      "uid": "demo-app-overview",
      "title": "Demo App Overview",
      "tags": ["demo"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "type": "stat",
          "title": "Total HTTP Requests",
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(demo_http_requests_total)",
              "legendFormat": "total",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "type": "timeseries",
          "title": "p95 Request Duration (s)",
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(demo_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        }
      ]
    }